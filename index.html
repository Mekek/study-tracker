<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🎓 Трекер учебного прогресса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

html, body { margin:0; padding:0; min-height:100%; font-family:'Poppins',sans-serif; color:white; }

/* --- Базовый фон (будет перезаписываться скриптом) --- */
body {
  background: radial-gradient(circle at 20% 30%, #6dd5fa, #2980b9 40%, #1c1c1c 100%);
  background-attachment: fixed;
  background-size: 100% 100%;
  transition: background 800ms ease;
}

/* Остальной стиль */
h1 { text-align:center; margin:25px 0 10px; font-size:2.2em; text-shadow:0 0 15px rgba(255,255,255,0.35); }
.container { width:90%; max-width:980px; margin:0 auto 40px; background:rgba(0,0,0,0.35); backdrop-filter: blur(10px); border-radius:20px; padding:25px 35px; box-shadow:0 0 30px rgba(0,0,0,0.5); }
.progress-container { text-align:center; margin-bottom:30px; }
.progress-bar { width:100%; height:25px; background:rgba(255,255,255,0.18); border-radius:10px; overflow:hidden; margin-top:10px; }
.progress-fill { height:100%; background:linear-gradient(90deg,#76ff03,#00e676); width:0%; border-radius:10px; transition: width .6s ease, background 1s ease; }
.stats { display:flex; justify-content:space-between; margin-bottom:10px; font-size:1.1em; }
.discipline { margin-bottom:20px; background:rgba(255,255,255,0.06); padding:10px 15px; border-radius:10px; }
.discipline h3 { margin-bottom:8px; color:#fff; font-weight:600; }
.discipline-checkpoints { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:10px 12px; margin-top:5px; }
.checkpoint { display:flex; align-items:center; gap:8px; }
.checkpoint label { cursor:pointer; transition:all .25s; }
.checkpoint input:checked + label { text-decoration:line-through; color:#bbb; }
#countdown { position:fixed; right:20px; top:20px; background:rgba(0,0,0,0.45); border-radius:12px; padding:10px 18px; text-align:center; font-weight:600; backdrop-filter: blur(5px); box-shadow:0 0 10px rgba(0,0,0,0.3); }
#speed { text-align:center; font-size:1.1em; margin-bottom:10px; }
.note { font-size:0.9em; color:#ddd; margin-top:8px; text-align:center; }
</style>
</head>
<body>
<h1>🎓 Трекер учебного прогресса</h1>
<div id="countdown"></div>
<div class="container">
  <div class="progress-container">
    <div id="speed">Требуемая скорость закрытия — 0 дней/точку</div>
    <div class="stats">
      <span>Прогресс:</span>
      <span id="percent">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="note">Фон становится «теплее» по мере приближения дедлайна и при большом количестве несданных точек.</div>
  </div>
  <div id="disciplines"></div>
</div>

<script>
// ------------------ Настройки ------------------
const END_OF_SESSION = new Date("2026-06-30T23:59:59"); // <- поменяй если нужно
const START_OF_SEMESTER = new Date("2026-02-01T00:00:00"); // начало семестра для интерполяции (можно изменить)

// ------------------ Данные дисциплин ------------------
function slugify(text){
  return String(text).toLowerCase().replace(/\s+/g,'_').replace(/[^\w\-]/g,'').replace(/\_+/g,'_');
}

const STORAGE_KEY = "trackerState_v3";

// Формат дисциплин — как в предыдущем коде: можно указывать строки или {label, weight}
const disciplines = {
  "Компьютерное зрение": [
    "Онлайн — Раздел 1",
    "Онлайн — Раздел 2",
    "Онлайн — Раздел 3",
    "Онлайн — Раздел 4",
    "Онлайн — Раздел 5",
    "Зачёт"
  ],
  "Компьютерные сети": [
    "ДЗ 1","ЛР 1","ЛР 2","ЛР 3","ЛР 4","Т1","Т2","Т3","ТИт"
  ],
  "Нейротехнологии и аффективные вычисления": [
    {label:"Рубежная работа 1", weight:10},
    {label:"Рубежная работа 2", weight:10},
    {label:"Проект: исследование", weight:8},
    {label:"Проект: Прототип", weight:8},
    {label:"Проект: улучшенный прототип", weight:8},
    {label:"Проект: финальное решение", weight:8},
    {label:"Проект: Защита", weight:8},
    {label:"ЛР 1", weight:10},
    {label:"ЛР 2", weight:10}
  ],
  "Программирование встроенных систем": [
    "Проект (ТЗ)","Проект (реализация)","Проект (доработка)"
  ],
  "Сетевые технологии интернета вещей": [
    "Проект (ТЗ)","Проект (получить компоненты)","Проект (собрать компоненты)",
    "Проект (Собрать прототип)","Проект (Запрограммировать)","Проект (Собрать финальное устройство)"
  ],
  "САПР": ["ДЗ 1","ДЗ 2","Тест","Экзамен"],
  "Стартап-трек": Array.from({length:10},(_,i)=>`Посещение ${i+1}`),
  "ТПО (Тестирование ПО)": ["ЛР 1","ЛР 2","ЛР 3","ЛР 4","Рубежная работа"],
  "Физическая культура и спорт": Array.from({length:20},(_,i)=>`Посещение ${i+1}`),
  "Философия": [...Array.from({length:10},(_,i)=>`Посещение ${i+1}`), "Экзамен", "Проектная работа", "Текст 1", "Тест 2"]
};

// ------------------ Сохранение / загрузка ------------------
function saveState(){
  const st = {};
  document.querySelectorAll("input[type=checkbox]").forEach(cb => st[cb.id] = cb.checked);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}
function loadState(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch(e){ return {}; }
}

// ------------------ РЕНДЕР ------------------
const container = document.getElementById("disciplines");

function render(){
  const saved = loadState();
  container.innerHTML = "";
  for(const [disc, items] of Object.entries(disciplines)){
    const block = document.createElement("div");
    block.className = "discipline";
    const title = document.createElement("h3"); title.textContent = disc; block.appendChild(title);

    const grid = document.createElement("div"); grid.className = "discipline-checkpoints";

    items.forEach((it, idx) => {
      const labelText = (typeof it === "string") ? it : it.label;
      const id = `${slugify(disc)}-${idx}`;
      const wrapper = document.createElement("div"); wrapper.className = "checkpoint";
      const checkbox = document.createElement("input"); checkbox.type = "checkbox"; checkbox.id = id;
      checkbox.checked = !!saved[id];
      checkbox.addEventListener("change", ()=>{ saveState(); calculateProgress(); });

      const label = document.createElement("label"); label.htmlFor = id; label.textContent = labelText;
      wrapper.appendChild(checkbox); wrapper.appendChild(label); grid.appendChild(wrapper);
    });

    block.appendChild(grid); container.appendChild(block);
  }
  calculateProgress();
}

// ------------------ РАСЧЁТ ПРОГРЕССА + ГРАДИЕНТ ------------------
function calculateProgress(){
  const now = new Date();
  const disciplineNames = Object.keys(disciplines);
  const disciplineWeightPercent = 100 / disciplineNames.length;

  let totalProgress = 0;
  let uncheckedCount = 0;
  let totalCheckpoints = 0;

  // считаем прогресс и количество чекпоинтов
  for(const [disc, items] of Object.entries(disciplines)){
    const checkpoints = items.map(it => (typeof it === "string") ? {label: it, weight:1} : {label: it.label, weight: (typeof it.weight === "number" ? it.weight : 1)});
    const totalWeight = checkpoints.reduce((s,c)=>s+c.weight,0);
    totalCheckpoints += checkpoints.length;

    let checkedWeight = 0;
    checkpoints.forEach((cp,i)=>{
      const id = `${slugify(disc)}-${i}`;
      const cb = document.getElementById(id);
      if (cb && cb.checked) checkedWeight += cp.weight;
      else uncheckedCount += 1;
    });

    const fraction = totalWeight > 0 ? (checkedWeight/totalWeight) : 0;
    totalProgress += disciplineWeightPercent * fraction;
  }

  totalProgress = Math.max(0, Math.min(100, totalProgress));
  document.getElementById("percent").textContent = totalProgress.toFixed(1) + "%";
  document.getElementById("progress-fill").style.width = totalProgress + "%";

  // Скорость закрытия (как раньше)
  const diffDays = Math.ceil((END_OF_SESSION - now)/(1000*60*60*24));
  const speedPerPoint = uncheckedCount > 0 && diffDays > 0 ? (diffDays / uncheckedCount).toFixed(1) : (uncheckedCount === 0 ? "∞" : "—");
  let pointsPerDayText = "";
  if (uncheckedCount > 0 && diffDays > 0) {
    const pointsPerDay = (uncheckedCount / diffDays).toFixed(1);
    let pointWord = "точек";
    const num = parseFloat(pointsPerDay);
    if (num === 1) pointWord = "точка";
    else if (num > 1 && num < 5) pointWord = "точки";
    pointsPerDayText = ` или ${pointsPerDay} ${pointWord}/день`;
  } else if (uncheckedCount === 0) pointsPerDayText = " — все точки закрыты!";
  else if (diffDays <= 0) pointsPerDayText = " — время вышло!";
  document.getElementById("speed").textContent = `Требуемая скорость закрытия — ${speedPerPoint} дней/точку${pointsPerDayText}`;

  // ---- Градиент: зависит от времени и от количества оставшихся точек ----
  // 1) timeRatio: 0 = начало семестра, 1 = дедлайн
  const totalTime = Math.max(1, END_OF_SESSION - START_OF_SEMESTER);
  const timePassed = now - START_OF_SEMESTER;
  let timeRatio = timePassed / totalTime;
  timeRatio = Math.max(0, Math.min(1, timeRatio));

  // 2) remainingRatio: 0 = всё сдано, 1 = всё не сдано
  const remainingRatio = totalCheckpoints > 0 ? (uncheckedCount / totalCheckpoints) : 0;

  // 3) объединяем: хотим сильный эффект, когда и время близко, и много несданных
  // Используем небольшое усиление нелинейностью, чтобы крайние случаи выглядели сильнее
  let severity = Math.pow(timeRatio, 1.3) * Math.pow(remainingRatio, 1.0); // диапазон 0..1
  // если осталось <=7 дней — усиливаем тревогу
  const daysLeft = Math.ceil((END_OF_SESSION - now)/(1000*60*60*24));
  if (daysLeft <= 7 && daysLeft >= 0) severity = Math.min(1, severity * 1.5);

  // превращаем severity в цветовую интерполяцию: hue 200 (синий) -> 0 (красный)
  const hue = 200 - (severity * 200); // 200..0
  const sat = 80 + (severity * 10);   // насыщенность чуть растёт к тревоге
  const light = 60 - (severity * 10); // чуть темнеет при тревоге

  // создаём красивый радиальный градиент с несколькими слоями
  const main = `hsl(${hue}, ${sat}%, ${light}%)`;
  const mid = `hsl(${Math.max(0,hue-18)}, ${Math.max(60, sat-10)}%, ${Math.max(35, light-20)}%)`;
  const dark = "#111111";

  document.body.style.background = `
    radial-gradient(circle at 20% 30%, ${main}, ${mid} 40%, ${dark} 100%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,${Math.min(0.03, 0.03 + severity*0.07)}), transparent 25%)
  `;

  // --- Дополнительно: меняем цвет полосы прогресса при сильной тревоге ---
  const bar = document.getElementById("progress-fill");
  if (severity > 0.6) {
    bar.style.background = `linear-gradient(90deg, #ff5252, #ff1744)`; // красная
  } else if (severity > 0.3) {
    bar.style.background = `linear-gradient(90deg, #ffb347, #ff7043)`; // оранжевый
  } else {
    bar.style.background = `linear-gradient(90deg,#76ff03,#00e676)`; // зелёный
  }
}

// ------------------ Таймер обратного отсчёта ------------------
function updateCountdown(){
  const now = new Date();
  const diff = END_OF_SESSION - now;
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);
  const seconds = Math.floor((diff/1000)%60);

  if (diff > 0) {
    document.getElementById("countdown").textContent = `⏳ До конца семестра: ${days}д ${hours}ч ${minutes}м ${seconds}с`;
  } else {
    document.getElementById("countdown").textContent = "⏳ Время вышло! Семестр завершён";
  }
}

// ------------------ Инициализация ------------------
render();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
