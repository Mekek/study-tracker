<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎓 Трекер учебного прогресса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Poppins', sans-serif;
  color: white;
}

/* --- Фон с волнами --- */
body {
  background: radial-gradient(circle at 20% 30%, #6dd5fa, #2980b9 40%, #1c1c1c 100%);
  background-size: 400% 400%;
  animation: gradientFlow 25s ease infinite;
  transition: background 2s ease;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Тёплые тона к Новому году */
body.warmer {
  background: radial-gradient(circle at 30% 30%, #ff9a9e, #fad0c4 25%, #fcb69f 60%, #1c1c1c 100%);
}

h1 {
  text-align: center;
  margin: 25px 0 10px;
  font-size: 2.2em;
  text-shadow: 0 0 15px rgba(255,255,255,0.4);
}

.container {
  width: 90%;
  max-width: 900px;
  margin: 0 auto 40px;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px 35px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.progress-container {
  text-align: center;
  margin-bottom: 30px;
}

.progress-bar {
  width: 100%;
  height: 25px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #76ff03, #00e676);
  width: 0%;
  border-radius: 10px;
  transition: width 0.6s ease, background 1s ease;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 1.1em;
}

.discipline {
  margin-bottom: 20px;
  background: rgba(255, 255, 255, 0.08);
  padding: 10px 15px;
  border-radius: 10px;
}

.discipline h3 {
  margin-bottom: 8px;
  color: #fff;
  font-weight: 600;
}

/* Grid для чекбоксов */
.discipline-checkpoints {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px 12px;
  margin-top: 5px;
}

/* Каждый чекбокс + подпись */
.checkpoint {
  display: flex;
  align-items: center;
  gap: 5px;
}

.checkpoint label {
  cursor: pointer;
  transition: all 0.3s;
}

/* Зачёркивание текста при отметке */
.checkpoint input:checked + label {
  text-decoration: line-through;
  color: #ccc;
}

#countdown {
  position: fixed;
  right: 20px;
  top: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 12px;
  padding: 10px 18px;
  text-align: center;
  font-weight: 600;
  backdrop-filter: blur(5px);
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

#speed {
  text-align: center;
  font-size: 1.1em;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>🎓 Трекер учебного прогресса</h1>

<div id="countdown"></div>

<div class="container">
  <div class="progress-container">
    <div id="speed">Требуемая скорость закрытия — 0 дней/точку</div>
    <div class="stats">
      <span>Прогресс:</span>
      <span id="percent">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="disciplines"></div>
</div>

<script>
const disciplines = {
  "Биометрия и нейротехнологии": ["Рубеж 1", "Рубеж 2", "Онлайн-курс", "ЛР"],
  "English": [...Array.from({length:16}, (_,i)=>`Посещение ${i+1}`),"ДЗ 1","ДЗ 2","ДЗ 3","ДЗ 4"],
  "Операционные системы": ["ЛР 1","ЛР 2","Рубеж"],
  "Основы электротехники": ["ЛР 1","ДЗ 1","ЛР 2","ДЗ 2","ЛР 3","ДЗ 3","ЛР 4","ДЗ 4"],
  "Физра": Array.from({length:20}, (_,i)=>`Посещение ${i+1}`),
  "ИНТ": ["Реферат"],
  "Web-программирование": ["ЛР 1","ЛР 2","Рубеж 1","ЛР 3","ЛР 4","Рубеж 2"],
  "Моделирование": ["ЛР 1","ЛР 2","Рубеж 1","ЛР 3","ЛР 4","Рубеж 2"]
};

const totalWeightPerDiscipline = 100 / Object.keys(disciplines).length;
const container = document.getElementById("disciplines");

function saveState() {
  const state = {};
  document.querySelectorAll("input[type='checkbox']").forEach(cb=>state[cb.id]=cb.checked);
  localStorage.setItem("trackerState", JSON.stringify(state));
}

function loadState() {
  return JSON.parse(localStorage.getItem("trackerState")||"{}");
}

function calculateProgress() {
  let totalProgress = 0;
  let uncheckedCount = 0;
  const now = new Date();
  const newYear = new Date("2026-01-01T00:00:00");
  const diffDays = Math.ceil((newYear - now)/(1000*60*60*24));

  for(const [discipline, checkpoints] of Object.entries(disciplines)){
    const checked = checkpoints.filter((_,i)=>document.getElementById(`${discipline}-${i}`).checked).length;
    totalProgress += (checked/checkpoints.length)*totalWeightPerDiscipline;
    uncheckedCount += (checkpoints.length - checked);
  }

  const speed = uncheckedCount>0?(diffDays/uncheckedCount).toFixed(1):"∞";
  document.getElementById("speed").textContent = `Требуемая скорость закрытия — ${speed} дней/точку`;
  document.getElementById("percent").textContent = totalProgress.toFixed(1)+"%";

  const bar = document.getElementById("progress-fill");
  bar.style.width = totalProgress+"%";

  // Тёплые тона к НГ
  const daysFromNov3 = Math.max(0, (now - new Date("2025-11-03"))/(1000*60*60*24));
  const ratio = Math.min(daysFromNov3/60,1);
  document.body.classList.toggle("warmer", ratio>0.4);
}

function render() {
  const saved = loadState();
  for(const [discipline, checkpoints] of Object.entries(disciplines)){
    const block = document.createElement("div");
    block.classList.add("discipline");
    const title = document.createElement("h3");
    title.textContent = discipline;
    block.appendChild(title);

    const grid = document.createElement("div");
    grid.classList.add("discipline-checkpoints");

    checkpoints.forEach((labelText,i)=>{
      const wrapper = document.createElement("div");
      wrapper.classList.add("checkpoint");

      const checkbox = document.createElement("input");
      const id = `${discipline}-${i}`;
      checkbox.type = "checkbox";
      checkbox.id = id;
      checkbox.checked = saved[id]||false;
      checkbox.addEventListener("change", ()=>{
        saveState();
        calculateProgress();
      });

      const label = document.createElement("label");
      label.htmlFor = id;
      label.textContent = labelText;

      wrapper.appendChild(checkbox);
      wrapper.appendChild(label);
      grid.appendChild(wrapper);
    });

    block.appendChild(grid);
    container.appendChild(block);
  }
  calculateProgress();
}

function updateCountdown(){
  const now = new Date();
  const newYear = new Date("2026-01-01T00:00:00");
  const diff = newYear-now;
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);
  const seconds = Math.floor((diff/1000)%60);
  document.getElementById("countdown").textContent=
    `🎄 До Нового года: ${days}д ${hours}ч ${minutes}м ${seconds}с`;
}

setInterval(updateCountdown,1000);
render();
</script>
</body>
</html>
