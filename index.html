<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎓 Трекер учебного прогресса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: 'Poppins', sans-serif;
  color: white;
}

/* --- Фон с волнами --- */
body {
  background: radial-gradient(circle at 20% 30%, #6dd5fa, #2980b9 40%, #1c1c1c 100%);
  background-attachment: fixed;
  background-size: 100% 100%;
  animation: gradientFlow 25s ease infinite;
  transition: background 2s ease;
  background-repeat: no-repeat;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body.warmer {
  background: radial-gradient(circle at 30% 30%, #ff9a9e, #fad0c4 25%, #fcb69f 60%, #1c1c1c 100%);
  background-attachment: fixed;
  background-size: 100% 100%;
  background-repeat: no-repeat;
}

h1 {
  text-align: center;
  margin: 25px 0 10px;
  font-size: 2.2em;
  text-shadow: 0 0 15px rgba(255,255,255,0.4);
}

.container {
  width: 90%;
  max-width: 980px;
  margin: 0 auto 40px;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px 35px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.progress-container {
  text-align: center;
  margin-bottom: 30px;
}

.progress-bar {
  width: 100%;
  height: 25px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #76ff03, #00e676);
  width: 0%;
  border-radius: 10px;
  transition: width 0.6s ease, background 1s ease;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 1.1em;
}

.discipline {
  margin-bottom: 20px;
  background: rgba(255, 255, 255, 0.08);
  padding: 10px 15px;
  border-radius: 10px;
}

.discipline h3 {
  margin-bottom: 8px;
  color: #fff;
  font-weight: 600;
}

/* Grid для чекбоксов */
.discipline-checkpoints {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px 12px;
  margin-top: 5px;
}

/* Каждый чекбокс + подпись */
.checkpoint {
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkpoint label {
  cursor: pointer;
  transition: all 0.3s;
}

/* Зачёркивание текста при отметке */
.checkpoint input:checked + label {
  text-decoration: line-through;
  color: #ccc;
}

#countdown {
  position: fixed;
  right: 20px;
  top: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 12px;
  padding: 10px 18px;
  text-align: center;
  font-weight: 600;
  backdrop-filter: blur(5px);
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

#speed {
  text-align: center;
  font-size: 1.1em;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>🎓 Трекер учебного прогресса</h1>

<div id="countdown"></div>

<div class="container">
  <div class="progress-container">
    <div id="speed">Требуемая скорость закрытия — 0 дней/точку</div>
    <div class="stats">
      <span>Прогресс:</span>
      <span id="percent">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="disciplines"></div>
</div>

<script>
// --- Утилиты ---
function slugify(text){
  return String(text).toLowerCase()
    .replace(/\s+/g,'_')
    .replace(/[^\w\-]/g,'')
    .replace(/\_+/g,'_');
}

const STORAGE_KEY = "trackerState_v2";

// --- Данные дисциплин (обновлённый семестр) ---
// Поддерживаются два варианта записи:
// 1) ["Контроль 1","Контроль 2", ...]  — равные веса внутри дисциплины
// 2) [{label:"Контроль", weight: <число>}, ...] — если нужно задать относительные веса (весовые коэффициенты внутри дисциплины)
const disciplines = {
  "Компьютерное зрение": [
    "Онлайн — Раздел 1",
    "Онлайн — Раздел 2",
    "Онлайн — Раздел 3",
    "Онлайн — Раздел 4",
    "Онлайн — Раздел 5",
    "Зачёт"
  ],

  "Компьютерные сети": [
    "ДЗ 1",
    "ЛР 1",
    "ЛР 2",
    "ЛР 3",
    "ЛР 4",
    "Т1",
    "Т2",
    "Т3",
    "ТИт"
  ],

  "Нейротехнологии и аффективные вычисления": [
    // здесь указаны относительные веса (баллы) — скрипт нормализует их внутри дисциплины
    { label: "Рубежная работа 1", weight: 10 },
    { label: "Рубежная работа 2", weight: 10 },
    // Проект: вес 40 разделён между пунктами (здесь даю каждому равную часть 40/5 = 8)
    { label: "Проект: исследование", weight: 8 },
    { label: "Проект: Прототип", weight: 8 },
    { label: "Проект: улучшенный прототип", weight: 8 },
    { label: "Проект: финальное решение", weight: 8 },
    { label: "Проект: Защита", weight: 8 },
    { label: "ЛР 1", weight: 10 },
    { label: "ЛР 2", weight: 10 }
  ],

  "Программирование встроенных систем": [
    "Проект (ТЗ)",
    "Проект (реализация)",
    "Проект (доработка)"
  ],

  "Сетевые технологии интернета вещей": [
    "Проект (ТЗ)",
    "Проект (получить компоненты)",
    "Проект (собрать компоненты)",
    "Проект (Собрать прототип)",
    "Проект (Запрограммировать)",
    "Проект (Собрать финальное устройство)"
  ],

  "САПР": [
    "ДЗ 1",
    "ДЗ 2",
    "Тест",
    "Экзамен"
  ],

  "Стартап-трек": Array.from({length:10}, (_,i)=>`Посещение ${i+1}`),

  "ТПО (Тестирование ПО)": [
    "ЛР 1",
    "ЛР 2",
    "ЛР 3",
    "ЛР 4",
    "Рубежная работа"
  ],

  "Физическая культура и спорт": Array.from({length:20}, (_,i)=>`Посещение ${i+1}`),

  "Философия": [
    // 10 посещений + экзамен + проект + Текст 1 + Тест 2
    ...Array.from({length:10}, (_,i)=>`Посещение ${i+1}`),
    "Экзамен",
    "Проектная работа",
    "Текст 1",
    "Тест 2"
  ]
};

// --- Сохранение / загрузка состояния ---
function saveState() {
  const state = {};
  document.querySelectorAll("input[type='checkbox']").forEach(cb=>{
    state[cb.id] = cb.checked;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch(e) {
    return {};
  }
}

// --- Рендер чеков ---
const container = document.getElementById("disciplines");

function render(){
  const saved = loadState();
  container.innerHTML = "";
  for(const [discipline, items] of Object.entries(disciplines)){
    const block = document.createElement("div");
    block.className = "discipline";

    const title = document.createElement("h3");
    title.textContent = discipline;
    block.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "discipline-checkpoints";

    items.forEach((item, idx) => {
      const labelText = (typeof item === "string") ? item : item.label;
      const id = `${slugify(discipline)}-${idx}`;

      const wrapper = document.createElement("div");
      wrapper.className = "checkpoint";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.id = id;
      checkbox.checked = !!saved[id];
      checkbox.addEventListener("change", ()=>{ saveState(); calculateProgress(); });

      const label = document.createElement("label");
      label.htmlFor = id;
      label.textContent = labelText;

      wrapper.appendChild(checkbox);
      wrapper.appendChild(label);
      grid.appendChild(wrapper);
    });

    block.appendChild(grid);
    container.appendChild(block);
  }

  calculateProgress();
}

// --- Расчёт прогресса ---
// Каждый предмет получает равную долю от общей 100%:
// disciplineWeightPercent = 100 / количество_дисциплин
// Внутри дисциплины шаги могут иметь относительный вес (weight). Если вес не указан — равный.
function calculateProgress(){
  const now = new Date();
  // Обновлён конец семестра (можешь изменить при необходимости)
  const endOfSession = new Date("2026-06-30T23:59:59");
  const diffDays = Math.ceil((endOfSession - now)/(1000*60*60*24));

  const disciplineNames = Object.keys(disciplines);
  const disciplineWeightPercent = 100 / disciplineNames.length;

  let totalProgress = 0;
  let uncheckedCount = 0;

  for(const [discipline, items] of Object.entries(disciplines)){
    // соберём объекты {label, weight}
    const checkpoints = items.map(it => {
      if (typeof it === "string") return { label: it, weight: 1 };
      // weight может быть задан, иначе падёт в 1
      return { label: it.label, weight: (typeof it.weight === "number" ? it.weight : 1) };
    });

    const totalWeight = checkpoints.reduce((s,c)=>s+c.weight, 0);
    // суммарный вес отмеченных чеков
    let checkedWeight = 0;
    checkpoints.forEach((cp, i) => {
      const id = `${slugify(discipline)}-${i}`;
      const cb = document.getElementById(id);
      if (cb && cb.checked) checkedWeight += cp.weight;
      else uncheckedCount += 1;
    });

    const fraction = totalWeight > 0 ? (checkedWeight / totalWeight) : 0;
    totalProgress += disciplineWeightPercent * fraction;
  }

  // ограничим от 0 до 100
  totalProgress = Math.max(0, Math.min(100, totalProgress));

  // скорость
  const speedPerPoint = uncheckedCount > 0 && diffDays > 0 ? (diffDays / uncheckedCount).toFixed(1) : (uncheckedCount === 0 ? "∞" : "—");
  let pointsPerDayText = "";
  if (uncheckedCount > 0 && diffDays > 0) {
    const pointsPerDay = (uncheckedCount / diffDays).toFixed(1);
    let pointWord = "точек";
    const num = parseFloat(pointsPerDay);
    if (num === 1) pointWord = "точка";
    else if (num > 1 && num < 5) pointWord = "точки";
    pointsPerDayText = ` или ${pointsPerDay} ${pointWord}/день`;
  } else if (uncheckedCount === 0) {
    pointsPerDayText = " — все точки закрыты!";
  } else if (diffDays <= 0) {
    pointsPerDayText = " — время вышло!";
  }

  document.getElementById("speed").textContent =
    `Требуемая скорость закрытия — ${speedPerPoint} дней/точку${pointsPerDayText}`;

  document.getElementById("percent").textContent = totalProgress.toFixed(1) + "%";
  const bar = document.getElementById("progress-fill");
  bar.style.width = Math.max(0, Math.min(100, totalProgress)) + "%";

  // Тёплые тона (маленький эффект)
  const daysFromNov3 = Math.max(0, (now - new Date("2025-11-03"))/(1000*60*60*24));
  const ratio = Math.min(daysFromNov3/60,1);
  document.body.classList.toggle("warmer", ratio>0.4);
}

// --- Countdown (таймер) ---
function updateCountdown(){
  const now = new Date();
  const endOfSession = new Date("2026-06-30T23:59:59");
  const diff = endOfSession - now;
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);
  const seconds = Math.floor((diff/1000)%60);

  if (diff > 0) {
    document.getElementById("countdown").textContent =
      `⏳ До конца семестра: ${days}д ${hours}ч ${minutes}м ${seconds}с`;
  } else {
    document.getElementById("countdown").textContent =
      "⏳ Время вышло! Семестр завершён";
  }
}

setInterval(updateCountdown, 1000);

// --- Старт ---
render();
</script>
</body>
</html>
